{% extends 'core/base.html' %} {% block content %}
<section class="bg-white border-b border-gray-200 py-8">
  <div class="max-w-7xl mx-auto px-4">
    <h1 class="text-3xl font-bold mb-6">Перевірені авто в Україні</h1>

    <div
      class="bg-gray-100 p-4 rounded-lg shadow-inner flex flex-col md:flex-row gap-4"
    >
      <div class="w-full md:w-1/5 flex flex-col gap-2">
        <select
          class="w-full p-3 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-ria-red"
        >
          <option>Всі авто</option>
          <option>Вживані</option>
          <option>Нові</option>
        </select>
      </div>

      <div class="w-full md:w-3/5 grid grid-cols-1 md:grid-cols-3 gap-2">
        <select class="p-3 rounded border border-gray-300 focus:outline-none">
          <option>Марка</option>
          <option>Toyota</option>
          <option>BMW</option>
        </select>
        <select class="p-3 rounded border border-gray-300 focus:outline-none">
          <option>Модель</option>
        </select>
        <select class="p-3 rounded border border-gray-300 focus:outline-none">
          <option>Регіон</option>
          <option>Київ</option>
          <option>Чернівці</option>
        </select>
      </div>

      <div class="w-full md:w-1/5">
        <button
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold p-3 rounded flex justify-center items-center h-full transition duration-200"
        >
          <i class="fa-solid fa-search mr-2"></i> Пошук
        </button>
      </div>
    </div>
  </div>
</section>

<section class="max-w-7xl mx-auto px-4 py-8">
  <h2 class="text-xl font-bold mb-4">Рекомендовані авто</h2>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
    {% for car in cars %}
    <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition-shadow duration-300">
      <a href="{% url 'car_detail' car.id %}">
        <img
          src="{{ car.image|default:'https://via.placeholder.com/400x300' }}"
          alt="{{ car.brand }} {{ car.model }}"
          class="w-full h-48 object-cover"
        />
        <div class="p-4">
          <h3 class="text-lg font-bold text-blue-600 hover:underline">
            {{ car.brand }} {{ car.model }} {{ car.year }}
          </h3>
          <div class="text-2xl font-bold text-green-600 mt-2">{{ car.price }} $</div>
        </div>
      </a>
    </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
