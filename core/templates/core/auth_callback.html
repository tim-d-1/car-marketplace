{% extends 'core/base.html' %}

{% block content %}
<div class="min-h-screen flex flex-col items-center justify-center bg-gray-50">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-ria-red"></div>
    <p class="mt-4 text-gray-600 font-medium">Авторизація через Google...</p>
</div>

<script>
    async function handleAuthCallback() {
        // Use the globally initialized client from base.html
        if (!window.supabaseClient) {
            console.error('Supabase client not initialized');
            return;
        }

        // Wait for Supabase to detect the session from the URL fragment
        const { data: { session }, error } = await window.supabaseClient.auth.getSession()
        
        if (session && session.user) {
            // Success! We have a Supabase session. 
            // Now tell Django to log this user in.
            const response = await fetch('{% url "auth_callback" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({
                    email: session.user.email,
                    id: session.user.id
                })
            });

            if (response.ok) {
                // Django has now set the session cookie!
                window.location.href = '/';
            } else {
                console.error('Django login failed');
                window.location.href = '{% url "login" %}?error=django_sync_failed';
            }
        } else {
            console.error('No Supabase session found', error);
            window.location.href = '{% url "login" %}';
        }
    }

    // Run as soon as the page loads
    window.onload = handleAuthCallback;
</script>
{% endblock %}
