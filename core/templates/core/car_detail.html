{% extends 'core/base.html' %} {% block content %}
<div class="max-w-7xl mx-auto px-4 py-12">
  <div class="bg-white rounded-xl shadow-lg overflow-hidden">
    <div class="grid grid-cols-1 md:grid-cols-2">
      <div class="bg-gray-100">
        <img
          src="{{ car.image|default:'https://via.placeholder.com/800x600' }}"
          alt="{{ car.brand }} {{ car.model }}"
          class="w-full h-full object-cover"
        />
      </div>
      <div class="p-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">
          {{ car.brand }} {{ car.model }} {{ car.year }}
        </h1>
        <div class="text-4xl font-extrabold text-ria-red mb-6">
          {{ car.price }} $
        </div>

        <div class="border-t border-b border-gray-100 py-6 mb-6">
          <h2 class="text-lg font-semibold text-gray-700 mb-2">Опис:</h2>
          <p class="text-gray-600 leading-relaxed">{{ car.description }}</p>
        </div>

        <div class="flex space-x-4">
          <button
            class="flex-1 bg-ria-red hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg transition duration-200"
          >
            Показати телефон
          </button>
          <button
            class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition duration-200"
          >
            Написати продавцю
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
